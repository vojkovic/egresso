when:
  - event: push
    branch: master

steps:
  test:
    image: golang:1.24
    commands:
      - go test -race -cover ./...
      - go vet ./...
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - golangci-lint run ./...

  publish:
    image: docker.io/woodpeckerci/plugin-kaniko:2.3.2
    settings:
      dockerfile: Dockerfile
      registry: codeberg.org
      repo: vojkovic/egresso
      tags: latest
      username: vojkovic
      password:
        from_secret: cb_token
